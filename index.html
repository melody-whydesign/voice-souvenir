<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voice Pendant Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
body { margin:0; font-family:-apple-system; background:#f5f5f7; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="viewer"></canvas>
<script>
const canvas = document.getElementById('viewer');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f5f7);

const camera = new THREE.PerspectiveCamera(35, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,0,120);

// APPLE STYLE LIGHTING
const key = new THREE.DirectionalLight(0xffffff, 2.5);
key.position.set(5,5,5);
scene.add(key);

const fill = new THREE.DirectionalLight(0xffffff, 1.2);
fill.position.set(-5,2,5);
scene.add(fill);

const rim = new THREE.DirectionalLight(0xffffff, 2);
rim.position.set(0,5,-5);
scene.add(rim);

const ambient = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambient);

// FLOOR REFLECTION
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.95, metalness:0 })
);
floor.rotation.x = -Math.PI/2;
floor.position.y = -40;
scene.add(floor);

// MATERIAL (APPLE STYLE)
function createMaterial(type){
  const presets = {
    silver:{ color:0xe5e7eb, metalness:1, roughness:0.25 },
    gold:{ color:0xf6c453, metalness:1, roughness:0.28 },
    black:{ color:0x2c2c2e, metalness:0.6, roughness:0.45 },
    rose:{ color:0xf2a1a1, metalness:1, roughness:0.3 }
  };
  const p = presets[type];
  return new THREE.MeshPhysicalMaterial({
    color:p.color,
    metalness:p.metalness,
    roughness:p.roughness,
    clearcoat:1,
    clearcoatRoughness:0.1
  });
}

// SIMPLE PREVIEW OBJECT
let mesh;
function createObject(colour='silver'){
  if(mesh) scene.remove(mesh);
  const geo = new THREE.TorusGeometry(25,10,64,128);
  mesh = new THREE.Mesh(geo, createMaterial(colour));
  scene.add(mesh);
}

createObject('gold');

// ROTATION
let isDown=false, lx=0, ly=0;
canvas.addEventListener('pointerdown',e=>{isDown=true;lx=e.clientX;ly=e.clientY});
canvas.addEventListener('pointerup',()=>isDown=false);
canvas.addEventListener('pointermove',e=>{
  if(!isDown) return;
  mesh.rotation.y += (e.clientX-lx)*0.01;
  mesh.rotation.x += (e.clientY-ly)*0.01;
  lx=e.clientX; ly=e.clientY;
});

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
