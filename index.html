<main class="app">

    <p class="hint" id="modeHint">Record your voice, crop the waveform, then generate a connected necklace-style pendant.</p>
  </aside>
  <section class="stage"><div class="stage-badge" id="stageBadge">Drag to rotate 360° • Vertical pendant</div><canvas id="viewer"></canvas><div class="loading" id="loading">Generating…</div></section>
</main>

function pendantGeometry(){

  const seg = amps.length;
  const verts=[]; const idx=[];

  return g;
}
function makeLoopAndConnector(h){const group=new THREE.Group(),mat=productMaterial(),y=h/2,bail=new THREE.Mesh(new THREE.TorusGeometry(7.2,1.55,28,120),mat);bail.scale.set(.68,1.42,1);bail.position.y=y+22.5;group.add(bail);const ring=new THREE.Mesh(new THREE.TorusGeometry(4.8,1.15,24,96),mat);ring.position.y=y+10.8;group.add(ring);const neck=new THREE.Mesh(new THREE.CylinderGeometry(2.5,4.8,7.2,64),mat);neck.position.y=y+3.4;group.add(neck);return group}
function vaseGeometry(){
  const h = Number(heightSlider.value);
  const max = Number(widthSlider.value)/2;
  const th = Number(thicknessSlider.value);
  const amps = getSelectedAmplitudes();
  const seg = amps.length;

  const verts=[]; const idx=[];
  let yStart = -h/2;
  const layerHeight = h / seg;

  for(let i=0;i<seg;i++){
    const amp = amps[i];
    const rOut = max * (0.4 + amp * 1.6);
    const rIn = Math.max(1, rOut - th);

    const outer = new THREE.CylinderGeometry(rOut, rOut, layerHeight, 96,1,true);
    const inner = new THREE.CylinderGeometry(rIn, rIn, layerHeight, 96,1,true);

    outer.translate(0, yStart + layerHeight/2 + i*layerHeight, 0);
    inner.translate(0, yStart + layerHeight/2 + i*layerHeight, 0);

    const merge = THREE.BufferGeometryUtils.mergeBufferGeometries([outer, inner]);

    const baseIndex = verts.length/3;
    const pos = merge.attributes.position.array;
    for(let v of pos) verts.push(v);

    const ind = merge.index.array;
    for(let j=0;j<ind.length;j++) idx.push(ind[j]+baseIndex);
  }

  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(verts,3));
  g.setIndex(idx);
  g.computeVertexNormals();
  return g;
}
function generateObject(showLoading=true,preserveRotation=true){let prev=null;if(state.mesh&&preserveRotation)prev={x:state.mesh.rotation.x,y:state.mesh.rotation.y,z:state.mesh.rotation.z};if(showLoading)loading.style.display='grid';requestAnimationFrame(()=>{if(state.mesh)scene.remove(state.mesh);const h=Number(heightSlider.value),max=Number(widthSlider.value)/2,group=new THREE.Group();let geo=state.mode==='vase'?vaseGeometry():(state.audioBuffer?pendantGeometry():new THREE.CylinderGeometry(max*.72,max*.72,h,96,1));group.add(new THREE.Mesh(geo,productMaterial()));if(state.mode==='pendant'&&state.audioBuffer&&state.orientation==='vertical')group.add(makeLoopAndConnector(h));scene.add(group);state.mesh=group;applyOrientation();if(prev){state.mesh.rotation.x=prev.x;state.mesh.rotation.y=prev.y;if(preserveRotation)state.mesh.rotation.z=prev.z}state.stlText=groupToSTL(group,state.mode==='pendant'?'voice_pendant':'voice_vase');downloadBtn.disabled=false;stageBadge.textContent=`Drag to rotate 360° • ${capitalize(state.mode)}`;if(showLoading)setTimeout(()=>loading.style.display='none',250)})}
function applyOrientation(){if(!state.mesh)return;if(state.mode==='vase'){state.mesh.rotation.z=0;return;}state.mesh.rotation.z=state.orientation==='horizontal'?Math.PI/2:0}
const viewer=$('viewer');viewer.addEventListener('pointerdown',e=>{state.isPointerRotating=true;state.lastPointerX=e.clientX;state.lastPointerY=e.clientY;viewer.setPointerCapture(e.pointerId)});viewer.addEventListener('pointermove',e=>{if(!state.isPointerRotating||!state.mesh)return;state.mesh.rotation.y+=(e.clientX-state.lastPointerX)*.01;state.mesh.rotation.x+=(e.clientY-state.lastPointerY)*.01;state.lastPointerX=e.clientX;state.lastPointerY=e.clientY});viewer.addEventListener('pointerup',()=>state.isPointerRotating=false);
function groupToSTL(group,name){group.updateMatrixWorld(true);let stl=`solid ${name}\n`;group.traverse(obj=>{if(!obj.isMesh)return;const geom=obj.geometry.clone();geom.applyMatrix4(obj.matrixWorld);const pos=geom.getAttribute('position'),ind=geom.index,n=new THREE.Vector3(),a=new THREE.Vector3(),b=new THREE.Vector3(),c=new THREE.Vector3(),faces=ind?ind.count/3:pos.count/3;for(let i=0;i<faces;i++){const ia=ind?ind.getX(i*3):i*3,ib=ind?ind.getX(i*3+1):i*3+1,ic=ind?ind.getX(i*3+2):i*3+2;a.fromBufferAttribute(pos,ia);b.fromBufferAttribute(pos,ib);c.fromBufferAttribute(pos,ic);n.crossVectors(new THREE.Vector3().subVectors(b,a),new THREE.Vector3().subVectors(c,a)).normalize();stl+=` facet normal ${n.x} ${n.y} ${n.z}\n  outer loop\n   vertex ${a.x} ${a.y} ${a.z}\n   vertex ${b.x} ${b.y} ${b.z}\n   vertex ${c.x} ${c.y} ${c.z}\n  endloop\n endfacet\n`}});return stl+`endsolid ${name}`}
function downloadSTL(){if(!state.stlText)return;const blob=new Blob([state.stlText],{type:'model/stl'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=state.mode==='pendant'?'voice-pendant.stl':'voice-vase.stl';a.click();URL.revokeObjectURL(a.href)}generateBtn.onclick=()=>generateObject(true);downloadBtn.onclick=downloadSTL;
function animate(){requestAnimationFrame(animate);if(state.mesh&&!state.isPointerRotating){
        // stop auto-rotation for horizontal pendant
        if(!(state.mode==='pendant' && state.orientation==='horizontal')){
          state.mesh.rotation.y += .0018;
        }
      }renderer.render(scene,camera)}updateLabelsAndPreview();resizeRenderer();generateObject(false);animate();
