<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Pendant 3D Generator</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f1ec;
      color: #222;
    }

    header {
      padding: 28px;
      text-align: center;
      background: #1f1f1f;
      color: white;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
    }

    .panel {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    button {
      width: 100%;
      padding: 14px 16px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      background: #222;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }

    input[type="range"] {
      width: 100%;
      margin-top: 8px;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 15px;
    }

    .option-row input {
      width: auto;
    }

    .timer {
      font-size: 34px;
      font-weight: bold;
      margin-top: 20px;
      text-align: center;
    }

    .meter-wrap {
      height: 14px;
      background: #ddd;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 14px;
    }

    .meter {
      height: 100%;
      width: 0%;
      background: #222;
      transition: width 0.06s linear;
    }

    #viewer {
      height: 680px;
      border-radius: 16px;
      overflow: hidden;
      background: #eeeae3;
    }

    .status {
      margin-top: 16px;
      font-size: 14px;
      color: #555;
      line-height: 1.5;
    }

    @media (max-width: 850px) {
      main {
        grid-template-columns: 1fr;
      }
      #viewer {
        height: 480px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Voice Pendant 3D Generator</h1>
    <p>Record a voice and transform it into a continuous printable pendant.</p>
  </header>

  <main>
    <section class="panel">
      <h2>Create Pendant</h2>

      <button id="startBtn">Start Recording</button>
      <button id="stopBtn" disabled>Stop Recording</button>

      <div class="timer" id="timer">00:00</div>
      <div class="meter-wrap"><div class="meter" id="meter"></div></div>

      <button id="generateBtn" disabled>Generate 3D Pendant</button>
      <button id="downloadBtn" disabled>Download STL</button>

      <label for="heightInput">Object height</label>
      <input id="heightInput" type="range" min="90" max="180" value="140" />

      <label for="radiusInput">Maximum width</label>
      <input id="radiusInput" type="range" min="10" max="34" value="24" />

      <label for="detailInput">Voice detail</label>
      <input id="detailInput" type="range" min="60" max="180" value="120" />

      <label for="ringInput">Ring strength</label>
      <input id="ringInput" type="range" min="0" max="20" value="11" />

      <label>Select ornament parts</label>
      <div class="option-row"><input id="topLoopCheck" type="checkbox" checked /> <span>Top hanging loop</span></div>
      <div class="option-row"><input id="wideDiscCheck" type="checkbox" checked /> <span>Wide circular discs</span></div>
      <div class="option-row"><input id="voiceRidgeCheck" type="checkbox" checked /> <span>Voice ridges</span></div>
      <div class="option-row"><input id="bottomDropCheck" type="checkbox" checked /> <span>Bottom drop</span></div>

      <div class="status" id="status">
        Ready. Record 3 to 8 seconds. The audio will generate a one-piece pendant.
      </div>
    </section>

    <section class="panel">
      <div id="viewer"></div>
    </section>
  </main>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { STLExporter } from 'three/addons/exporters/STLExporter.js';

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const generateBtn = document.getElementById('generateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusEl = document.getElementById('status');
    const timerEl = document.getElementById('timer');
    const meterEl = document.getElementById('meter');
    const heightInput = document.getElementById('heightInput');
    const radiusInput = document.getElementById('radiusInput');
    const detailInput = document.getElementById('detailInput');
    const ringInput = document.getElementById('ringInput');
    const topLoopCheck = document.getElementById('topLoopCheck');
    const wideDiscCheck = document.getElementById('wideDiscCheck');
    const voiceRidgeCheck = document.getElementById('voiceRidgeCheck');
    const bottomDropCheck = document.getElementById('bottomDropCheck');
    const viewer = document.getElementById('viewer');

    let mediaRecorder;
    let audioChunks = [];
    let audioBuffer = null;
    let currentObject = null;
    let recordingStart = 0;
    let timerInterval = null;
    let audioContextLive = null;
    let analyser = null;
    let meterAnimation = null;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xeeeae3);

    const camera = new THREE.PerspectiveCamera(45, viewer.clientWidth / viewer.clientHeight, 0.1, 3000);
    camera.position.set(95, -190, 110);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    viewer.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.55));

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(100, -120, 220);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.45);
    fillLight.position.set(-120, 100, 120);
    scene.add(fillLight);

    const grid = new THREE.GridHelper(160, 16);
    scene.add(grid);

    animate();
    buildDefaultPendant();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = viewer.clientWidth / viewer.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    });

    startBtn.onclick = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];

        audioContextLive = new AudioContext();
        const source = audioContextLive.createMediaStreamSource(stream);
        analyser = audioContextLive.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        updateMeter();

        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = event => audioChunks.push(event.data);

        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const arrayBuffer = await audioBlob.arrayBuffer();
          const decodeContext = new AudioContext();
          audioBuffer = await decodeContext.decodeAudioData(arrayBuffer);

          stream.getTracks().forEach(track => track.stop());
          stopRecordingUI();

          generateBtn.disabled = false;
          statusEl.textContent = 'Recording complete. Click Generate 3D Pendant.';
        };

        mediaRecorder.start();
        recordingStart = Date.now();
        timerInterval = setInterval(updateTimer, 200);

        startBtn.disabled = true;
        stopBtn.disabled = false;
        generateBtn.disabled = true;
        downloadBtn.disabled = true;
        statusEl.textContent = 'Recording... speak clearly.';
      } catch (error) {
        console.error(error);
        statusEl.textContent = 'Microphone failed. Please allow microphone permission and use Chrome or Edge.';
      }
    };

    stopBtn.onclick = () => {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
    };

    generateBtn.onclick = () => {
      if (!audioBuffer) return;
      buildVoicePendant(audioBuffer);
      downloadBtn.disabled = false;
      statusEl.textContent = 'One-piece pendant generated. Drag to rotate. Download STL when ready.';
    };

    downloadBtn.onclick = () => {
      if (!currentObject) return;
      const exporter = new STLExporter();
      const stlString = exporter.parse(currentObject, { binary: false });
      const blob = new Blob([stlString], { type: 'text/plain' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'voice-pendant.stl';
      link.click();
    };

    [heightInput, radiusInput, detailInput, ringInput, topLoopCheck, wideDiscCheck, voiceRidgeCheck, bottomDropCheck].forEach(el => {
      el.addEventListener('input', () => {
        if (audioBuffer) buildVoicePendant(audioBuffer);
        else buildDefaultPendant();
      });
    });

    function updateTimer() {
      const seconds = Math.floor((Date.now() - recordingStart) / 1000);
      const mm = String(Math.floor(seconds / 60)).padStart(2, '0');
      const ss = String(seconds % 60).padStart(2, '0');
      timerEl.textContent = `${mm}:${ss}`;
    }

    function updateMeter() {
      if (!analyser) return;
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a, b) => a + b, 0) / data.length;
      const level = Math.min(100, avg * 1.8);
      meterEl.style.width = `${level}%`;
      meterAnimation = requestAnimationFrame(updateMeter);
    }

    function stopRecordingUI() {
      startBtn.disabled = false;
      stopBtn.disabled = true;
      clearInterval(timerInterval);
      cancelAnimationFrame(meterAnimation);
      meterEl.style.width = '0%';
      if (audioContextLive) audioContextLive.close();
      audioContextLive = null;
      analyser = null;
    }

    function buildDefaultPendant() {
      const fake = Array.from({ length: Number(detailInput.value) }, (_, i) => {
        const t = i / (Number(detailInput.value) - 1);
        return 0.45 + 0.35 * Math.sin(t * Math.PI * 5) * Math.sin(t * Math.PI);
      });
      buildPendantFromWave(fake);
    }

    function buildVoicePendant(buffer) {
      const detail = Number(detailInput.value);
      const waveform = smoothArray(extractWaveform(buffer, detail), 5);
      buildPendantFromWave(waveform);
    }

    function buildPendantFromWave(waveform) {
      if (currentObject) scene.remove(currentObject);

      currentObject = new THREE.Group();

      const height = Number(heightInput.value);
      const maxRadius = Number(radiusInput.value);
      const ringStrength = Number(ringInput.value);

      const material = new THREE.MeshStandardMaterial({
        color: 0xd7d7d7,
        metalness: 0.72,
        roughness: 0.22
      });

      const mainMesh = createOnePieceLathe(waveform, height, maxRadius, ringStrength, material);
      currentObject.add(mainMesh);

      if (topLoopCheck.checked) addConnectedTopLoop(currentObject, height, material);

      scene.add(currentObject);
      frameObject(currentObject);
    }

    function createOnePieceLathe(waveform, height, maxRadius, ringStrength, material) {
      const points = [];
      const count = waveform.length;
      const includeDiscs = wideDiscCheck.checked;
      const includeVoice = voiceRidgeCheck.checked;
      const includeBottom = bottomDropCheck.checked;

      for (let i = 0; i < count; i++) {
        const t = i / (count - 1);
        const y = -height / 2 + t * height;

        let radius = 4.2;

        // Main slender body.
        radius += Math.sin(t * Math.PI) * 3.5;

        // Voice imprint controls the organic swelling.
        if (includeVoice) {
          radius += waveform[i] * maxRadius * 0.42;
          radius += Math.pow(Math.max(0, Math.sin(t * Math.PI * 18)), 12) * waveform[i] * 4.5;
        }

        // Large pendant discs are blended into the same lathe surface.
        if (includeDiscs) {
          radius += gaussian(t, 0.22, 0.030) * (maxRadius * 0.85 + ringStrength * 0.7);
          radius += gaussian(t, 0.43, 0.026) * (maxRadius * 0.70 + ringStrength * 0.55);
          radius += gaussian(t, 0.66, 0.030) * (maxRadius * 0.88 + ringStrength * 0.75);
          radius += gaussian(t, 0.82, 0.025) * (maxRadius * 0.58 + ringStrength * 0.35);
        }

        // Fine decorative rings, also part of the same skin.
        radius += Math.pow(Math.max(0, Math.sin(t * Math.PI * 10)), 20) * ringStrength * 0.35;

        // Necked sections between discs.
        radius -= gaussian(t, 0.34, 0.04) * 4.5;
        radius -= gaussian(t, 0.55, 0.035) * 4.0;
        radius -= gaussian(t, 0.75, 0.03) * 3.2;

        // Top taper connects to loop stem.
        if (t > 0.93) radius *= (1 - t) / 0.07;

        // Bottom pendant drop.
        if (includeBottom) {
          if (t < 0.08) radius *= Math.sin((t / 0.08) * Math.PI * 0.5);
          radius += gaussian(t, 0.055, 0.018) * 5.2;
          radius += gaussian(t, 0.015, 0.012) * 2.0;
        } else if (t < 0.06) {
          radius *= t / 0.06;
        }

        radius = Math.max(0.9, radius);
        points.push(new THREE.Vector2(radius, y));
      }

      // Close top and bottom cleanly for STL.
      points.unshift(new THREE.Vector2(0.01, -height / 2));
      points.push(new THREE.Vector2(0.01, height / 2));

      const geometry = new THREE.LatheGeometry(points, 160);
      geometry.computeVertexNormals();
      return new THREE.Mesh(geometry, material);
    }

    function addConnectedTopLoop(group, height, material) {
      // Stem touches the pendant top, so visually and physically it becomes one pendant part.
      const stem = new THREE.Mesh(
        new THREE.CylinderGeometry(2.2, 2.8, 15, 64),
        material
      );
      stem.position.y = height / 2 + 6.5;
      group.add(stem);

      const loop = new THREE.Mesh(
        new THREE.TorusGeometry(8, 1.7, 24, 96),
        material
      );
      loop.rotation.x = Math.PI / 2;
      loop.position.y = height / 2 + 18;
      group.add(loop);
    }

    function extractWaveform(buffer, sampleCount) {
      const channel = buffer.getChannelData(0);
      const blockSize = Math.max(1, Math.floor(channel.length / sampleCount));
      const samples = [];

      for (let i = 0; i < sampleCount; i++) {
        let sum = 0;
        const start = i * blockSize;
        for (let j = 0; j < blockSize; j++) {
          const value = channel[start + j] || 0;
          sum += value * value;
        }
        samples.push(Math.sqrt(sum / blockSize));
      }

      const max = Math.max(...samples) || 1;
      return samples.map(v => v / max);
    }

    function smoothArray(values, passes) {
      let result = values.slice();
      for (let p = 0; p < passes; p++) {
        result = result.map((v, i) => {
          const prev = result[i - 1] ?? v;
          const next = result[i + 1] ?? v;
          return (prev + v + next) / 3;
        });
      }
      return result;
    }

    function gaussian(x, center, width) {
      return Math.exp(-Math.pow(x - center, 2) / (2 * width * width));
    }

    function frameObject(object) {
      const box = new THREE.Box3().setFromObject(object);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const largest = Math.max(size.x, size.y, size.z);

      controls.target.copy(center);
      camera.position.set(center.x + largest * 0.8, center.y - largest * 1.5, center.z + largest * 0.7);
      camera.lookAt(center);
    }
  </script>
</body>
</html>
