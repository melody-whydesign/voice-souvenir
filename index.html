<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Pendant 3D Generator</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f1ec; color: #222; }
    header { padding: 28px; text-align: center; background: #1f1f1f; color: white; }
    main { max-width: 1200px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 360px 1fr; gap: 24px; }
    .panel { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    button { width: 100%; padding: 14px 16px; margin: 8px 0; border: none; border-radius: 10px; background: #222; color: white; font-size: 16px; cursor: pointer; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    label { display: block; margin-top: 14px; font-weight: bold; }
    input[type="range"] { width: 100%; margin-top: 8px; }
    .timer { font-size: 34px; font-weight: bold; margin-top: 20px; text-align: center; }
    #waveCanvas { width: 100%; height: 84px; display: block; background: #f0f0f0; border-radius: 14px; margin-top: 14px; margin-bottom: 18px; }
    .cropBox { display: none; padding: 12px; border-radius: 12px; background: #f5f5f5; margin: 10px 0 18px; }
    .cropReadout { font-size: 14px; color: #555; margin-top: 8px; line-height: 1.4; }
    #viewer { height: 680px; border-radius: 16px; overflow: hidden; background: #eeeae3; }
    .status { margin-top: 18px; font-size: 14px; color: #555; line-height: 1.5; }
    @media (max-width: 850px) {
      main {
        display: flex;
        flex-direction: column;
      }

      /* Move 3D viewer above controls on mobile */
      main section:nth-child(2) {
        order: -1;
      }

      #viewer {
        height: 420px;
        margin-bottom: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Voice Pendant 3D Generator</h1>
    <p>Record, crop, and transform your voice into a printable 3D pendant.</p>
  </header>

  <main>
    <section class="panel">
      <h2>Create Pendant</h2>

      <button id="startBtn">Start Recording</button>
      <button id="stopBtn" disabled>Stop Recording</button>
      <button id="playBtn" disabled>Play Recording</button>

      <label for="playbackInput">Playback position</label>
      <input id="playbackInput" type="range" min="0" max="1000" value="0" disabled />
      <div class="cropReadout" id="playbackReadout">Playback: 0.0s / 0.0s</div>

      <div class="timer" id="timer">00:00</div>
      <canvas id="waveCanvas" width="640" height="160"></canvas>

      <div class="cropBox" id="cropBox">
        <label for="cropStartInput">Crop start</label>
        <input id="cropStartInput" type="range" min="0" max="100" value="0" />

        <label for="cropEndInput">Crop end</label>
        <input id="cropEndInput" type="range" min="0" max="100" value="100" />

        <div class="cropReadout" id="cropReadout">Using full recording</div>
      </div>

      <button id="generateBtn" disabled>Generate 3D Pendant</button>
      <button id="downloadBtn" disabled>Download STL</button>

      <label for="heightInput">Pendant body height</label>
      <input id="heightInput" type="range" min="90" max="180" value="140" />

      <label for="radiusInput">Voice width effect</label>
      <input id="radiusInput" type="range" min="10" max="45" value="32" />

      <label for="detailInput">Voice detail</label>
      <input id="detailInput" type="range" min="80" max="220" value="160" />


      <div class="status" id="status">
        Record your voice, crop the best part, then generate your 3D pendant.
      </div>
    </section>

    <section class="panel">
      <div id="viewer"></div>
    </section>
  </main>

  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { STLExporter } from 'three/addons/exporters/STLExporter.js';

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const playBtn = document.getElementById('playBtn');
    const generateBtn = document.getElementById('generateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusEl = document.getElementById('status');
    const timerEl = document.getElementById('timer');
    const waveCanvas = document.getElementById('waveCanvas');
    const waveCtx = waveCanvas.getContext('2d');
    const cropBox = document.getElementById('cropBox');
    const cropStartInput = document.getElementById('cropStartInput');
    const cropEndInput = document.getElementById('cropEndInput');
    const cropReadout = document.getElementById('cropReadout');
    const heightInput = document.getElementById('heightInput');
    const radiusInput = document.getElementById('radiusInput');
    const detailInput = document.getElementById('detailInput');
    const playbackInput = document.getElementById('playbackInput');
    const playbackReadout = document.getElementById('playbackReadout');
    const viewer = document.getElementById('viewer');

    let mediaRecorder, audioBuffer, currentObject, timerInterval, audioContextLive, analyser, waveAnimation;
    let recordedAudioUrl = null;
    let playbackAudio = null;
    let playbackTimer = null;
    let audioChunks = [];
    let recordingStart = 0;
    let liveWaveHistory = [];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xeeeae3);

    const camera = new THREE.PerspectiveCamera(45, viewer.clientWidth / viewer.clientHeight, 0.1, 3000);
    camera.position.set(0, 0, 260);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    viewer.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(80, -120, 220);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0xffffff, 0.45);
    fillLight.position.set(-100, 80, 140);
    scene.add(fillLight);

    animate();
    drawEmptyWaveform();
    buildDefaultPendant();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = viewer.clientWidth / viewer.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    });

    startBtn.onclick = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];
        liveWaveHistory = [];
        audioBuffer = null;
        cropBox.style.display = 'none';
        drawEmptyWaveform();

        audioContextLive = new AudioContext();
        const source = audioContextLive.createMediaStreamSource(stream);
        analyser = audioContextLive.createAnalyser();
        analyser.fftSize = 2048;
        source.connect(analyser);
        drawLiveWaveform();

        const mimeType = getBestRecordingMimeType();
        mediaRecorder = mimeType
          ? new MediaRecorder(stream, { mimeType })
          : new MediaRecorder(stream);
        mediaRecorder.ondataavailable = event => audioChunks.push(event.data);

        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/mp4' });
          if (recordedAudioUrl) URL.revokeObjectURL(recordedAudioUrl);
          recordedAudioUrl = URL.createObjectURL(audioBlob);
          const arrayBuffer = await audioBlob.arrayBuffer();
          const decodeContext = new AudioContext();
          audioBuffer = await decodeContext.decodeAudioData(arrayBuffer);

          stream.getTracks().forEach(track => track.stop());
          stopRecordingUI();
          setupCropControls();
          drawFinalWaveform(audioBuffer);

          generateBtn.disabled = false;
          playBtn.disabled = false;
          playbackInput.disabled = false;
          playbackInput.value = 0;
          updatePlaybackReadout(0);
          statusEl.textContent = 'Recording complete. You can listen, crop the section, then generate the pendant.';
        };

        mediaRecorder.start();
        recordingStart = Date.now();
        timerEl.textContent = '00:00';
        timerInterval = setInterval(updateTimer, 200);

        startBtn.disabled = true;
        stopBtn.disabled = false;
        playBtn.disabled = true;
        playbackInput.disabled = true;
        playbackInput.value = 0;
        updatePlaybackReadout(0);
        generateBtn.disabled = true;
        downloadBtn.disabled = true;
        statusEl.textContent = 'Recording... you should see the waveform moving.';
      } catch (error) {
        console.error(error);
        statusEl.textContent = 'Microphone failed. Please allow microphone permission and use Chrome or Edge.';
      }
    };

    stopBtn.onclick = () => {
      if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    };

    playBtn.onclick = () => {
      if (!recordedAudioUrl || !audioBuffer) return;

      // If already playing, stop playback.
      if (playbackAudio && !playbackAudio.paused) {
        stopPlayback(false);
        return;
      }

      // Always create a fresh audio player. This avoids browser playback bugs.
      playbackAudio = document.createElement('audio');
      playbackAudio.src = recordedAudioUrl;
      playbackAudio.preload = 'auto';
      playbackAudio.currentTime = getPlaybackStartTime();

      playbackAudio.addEventListener('ended', () => {
        stopPlayback(true);
        playbackInput.value = 0;
        updatePlaybackReadout(0);
      });

      playbackAudio.play().then(() => {
        playBtn.textContent = 'Stop Playback';

        clearInterval(playbackTimer);
        playbackTimer = setInterval(() => {
          if (!playbackAudio || !audioBuffer) return;
          const percent = playbackAudio.currentTime / audioBuffer.duration;
          playbackInput.value = Math.min(1000, Math.max(0, percent * 1000));
          updatePlaybackReadout(playbackAudio.currentTime);
        }, 80);
      }).catch(error => {
        console.error(error);
        statusEl.textContent = 'Playback failed. Try recording again, then press Play Recording.';
        stopPlayback(false);
      });
    };

    playbackInput.addEventListener('input', () => {
      if (!audioBuffer) return;
      const time = getPlaybackStartTime();
      updatePlaybackReadout(time);

      if (playbackAudio) {
        playbackAudio.currentTime = time;
      }
    });

    function getBestRecordingMimeType() {
      const types = [
        'audio/mp4',
        'audio/aac',
        'audio/webm;codecs=opus',
        'audio/webm',
        'audio/ogg;codecs=opus'
      ];

      if (!window.MediaRecorder || !MediaRecorder.isTypeSupported) return '';
      return types.find(type => MediaRecorder.isTypeSupported(type)) || '';
    }

    function getPlaybackStartTime() {
      if (!audioBuffer) return 0;
      return (Number(playbackInput.value) / 1000) * audioBuffer.duration;
    }

    function updatePlaybackReadout(currentTime) {
      const total = audioBuffer ? audioBuffer.duration : 0;
      playbackReadout.textContent = `Playback: ${currentTime.toFixed(1)}s / ${total.toFixed(1)}s`;
    }

    function stopPlayback(resetToBeginning = false) {
      if (playbackAudio) {
        playbackAudio.pause();
        playbackAudio = null;
      }

      clearInterval(playbackTimer);
      playbackTimer = null;
      playBtn.textContent = 'Play Recording';

      if (resetToBeginning) {
        playbackInput.value = 0;
        updatePlaybackReadout(0);
      }
    }

    generateBtn.onclick = () => {
      if (!audioBuffer) return;
      const cropped = getCroppedAudioBuffer(audioBuffer);
      buildVoicePendant(cropped);
      downloadBtn.disabled = false;
      statusEl.textContent = 'Pendant generated from the selected audio section.';
    };

    downloadBtn.onclick = () => {
      if (!currentObject) return;
      const exporter = new STLExporter();
      const stlString = exporter.parse(currentObject, { binary: false });
      const blob = new Blob([stlString], { type: 'text/plain' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'voice-pendant.stl';
      link.click();
    };

    [heightInput, radiusInput, detailInput].forEach(el => {
      el.addEventListener('input', () => {
        if (audioBuffer) buildVoicePendant(getCroppedAudioBuffer(audioBuffer));
        else buildDefaultPendant();
      });
    });

    [cropStartInput, cropEndInput].forEach(el => {
      el.addEventListener('input', () => {
        normalizeCropInputs();
        updateCropReadout();
        drawFinalWaveform(audioBuffer);
        if (audioBuffer) buildVoicePendant(getCroppedAudioBuffer(audioBuffer));
      });
    });

    function setupCropControls() {
      cropStartInput.value = 0;
      cropEndInput.value = 100;
      cropBox.style.display = 'block';
      updateCropReadout();
    }

    function normalizeCropInputs() {
      let start = Number(cropStartInput.value);
      let end = Number(cropEndInput.value);
      if (start > end - 5) start = end - 5;
      if (end < start + 5) end = start + 5;
      start = Math.max(0, Math.min(95, start));
      end = Math.max(5, Math.min(100, end));
      cropStartInput.value = start;
      cropEndInput.value = end;
    }

    function updateCropReadout() {
      if (!audioBuffer) return;
      const duration = audioBuffer.duration;
      const startSec = (Number(cropStartInput.value) / 100) * duration;
      const endSec = (Number(cropEndInput.value) / 100) * duration;
      cropReadout.textContent = `Using ${startSec.toFixed(1)}s to ${endSec.toFixed(1)}s (${(endSec - startSec).toFixed(1)} seconds)`;
    }

    function getCroppedAudioBuffer(buffer) {
      const duration = buffer.duration;
      const sampleRate = buffer.sampleRate;
      const startSec = (Number(cropStartInput.value) / 100) * duration;
      const endSec = (Number(cropEndInput.value) / 100) * duration;
      const startSample = Math.floor(startSec * sampleRate);
      const endSample = Math.floor(endSec * sampleRate);
      const frameCount = Math.max(1, endSample - startSample);

      const offlineContext = new OfflineAudioContext(buffer.numberOfChannels, frameCount, sampleRate);
      const croppedBuffer = offlineContext.createBuffer(buffer.numberOfChannels, frameCount, sampleRate);

      for (let channel = 0; channel < buffer.numberOfChannels; channel++) {
        const oldData = buffer.getChannelData(channel);
        const newData = croppedBuffer.getChannelData(channel);
        for (let i = 0; i < frameCount; i++) newData[i] = oldData[startSample + i] || 0;
      }
      return croppedBuffer;
    }

    function updateTimer() {
      const seconds = Math.floor((Date.now() - recordingStart) / 1000);
      timerEl.textContent = `${String(Math.floor(seconds / 60)).padStart(2, '0')}:${String(seconds % 60).padStart(2, '0')}`;
    }

    function drawEmptyWaveform() {
      waveCtx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
      waveCtx.fillStyle = '#f0f0f0';
      waveCtx.fillRect(0, 0, waveCanvas.width, waveCanvas.height);
      waveCtx.strokeStyle = '#222';
      waveCtx.lineWidth = 2;
      waveCtx.beginPath();
      waveCtx.moveTo(20, waveCanvas.height / 2);
      waveCtx.lineTo(waveCanvas.width - 20, waveCanvas.height / 2);
      waveCtx.stroke();
    }

    function drawLiveWaveform() {
      if (!analyser) return;
      const bufferLength = analyser.fftSize;
      const dataArray = new Uint8Array(bufferLength);
      analyser.getByteTimeDomainData(dataArray);

      waveCtx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
      waveCtx.fillStyle = '#f0f0f0';
      waveCtx.fillRect(0, 0, waveCanvas.width, waveCanvas.height);
      waveCtx.strokeStyle = '#222';
      waveCtx.lineWidth = 3;
      waveCtx.beginPath();

      const sliceWidth = waveCanvas.width / bufferLength;
      let x = 0;
      for (let i = 0; i < bufferLength; i++) {
        const v = dataArray[i] / 128.0;
        const y = (v * waveCanvas.height) / 2;
        if (i === 0) waveCtx.moveTo(x, y);
        else waveCtx.lineTo(x, y);
        x += sliceWidth;
      }
      waveCtx.stroke();
      waveAnimation = requestAnimationFrame(drawLiveWaveform);
    }

    function drawFinalWaveform(buffer) {
      if (!buffer) return;
      const wave = extractSignedWaveform(buffer, 220);
      waveCtx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
      waveCtx.fillStyle = '#f0f0f0';
      waveCtx.fillRect(0, 0, waveCanvas.width, waveCanvas.height);

      const startX = (Number(cropStartInput.value) / 100) * waveCanvas.width;
      const endX = (Number(cropEndInput.value) / 100) * waveCanvas.width;
      waveCtx.fillStyle = 'rgba(0,0,0,0.12)';
      waveCtx.fillRect(startX, 0, endX - startX, waveCanvas.height);

      waveCtx.strokeStyle = '#222';
      waveCtx.lineWidth = 2.5;
      waveCtx.beginPath();
      wave.forEach((v, i) => {
        const x = (i / (wave.length - 1)) * waveCanvas.width;
        const y = waveCanvas.height / 2 - v * waveCanvas.height * 0.42;
        if (i === 0) waveCtx.moveTo(x, y);
        else waveCtx.lineTo(x, y);
      });
      waveCtx.stroke();

      waveCtx.strokeStyle = '#111';
      waveCtx.lineWidth = 3;
      waveCtx.beginPath();
      waveCtx.moveTo(startX, 0);
      waveCtx.lineTo(startX, waveCanvas.height);
      waveCtx.moveTo(endX, 0);
      waveCtx.lineTo(endX, waveCanvas.height);
      waveCtx.stroke();
    }

    function stopRecordingUI() {
      startBtn.disabled = false;
      stopBtn.disabled = true;
      clearInterval(timerInterval);
      cancelAnimationFrame(waveAnimation);
      if (audioContextLive) audioContextLive.close();
      audioContextLive = null;
      analyser = null;
    }

    function buildDefaultPendant() {
      const count = Number(detailInput.value);
      const fake = Array.from({ length: count }, (_, i) => {
        const t = i / (count - 1);
        return 0.25 + 0.65 * Math.abs(Math.sin(t * Math.PI * 5)) * Math.sin(t * Math.PI);
      });
      buildPendantFromWave(fake);
    }

    function buildVoicePendant(buffer) {
      const detail = Number(detailInput.value);
      const waveform = enhanceVoiceShape(smoothArray(extractAmplitudeEnvelope(buffer, detail), 3));
      buildPendantFromWave(waveform);
    }

    function buildPendantFromWave(waveform) {
      if (currentObject) scene.remove(currentObject);
      currentObject = new THREE.Group();

      const height = Number(heightInput.value);
      const voiceWidth = Number(radiusInput.value);
      const ringStrength = 9;
      const material = new THREE.MeshStandardMaterial({ color: 0xd7d7d7, metalness: 0.72, roughness: 0.22 });

      currentObject.add(createVoiceDrivenLathe(waveform, height, voiceWidth, ringStrength, material));
      addVerticalTopLoop(currentObject, height, material);
      scene.add(currentObject);
      setStraightSideView(currentObject);
    }

    function createVoiceDrivenLathe(waveform, height, voiceWidth, ringStrength, material) {
      const points = [];
      const count = waveform.length;

      for (let i = 0; i < count; i++) {
        const t = i / (count - 1);
        const y = -height / 2 + t * height;
        const voice = waveform[i];
        let radius = 3.6 + Math.sin(t * Math.PI) * 1.7;

        radius += Math.pow(voice, 1.25) * voiceWidth * 0.95;
        radius += Math.pow(Math.max(0, Math.sin(t * Math.PI * 26)), 10) * voice * 7.0;
        radius += gaussian(t, 0.20, 0.035) * (6 + voiceAt(waveform, 0.20) * voiceWidth * 0.65);
        radius += gaussian(t, 0.42, 0.040) * (7 + voiceAt(waveform, 0.42) * voiceWidth * 0.75);
        radius += gaussian(t, 0.65, 0.038) * (8 + voiceAt(waveform, 0.65) * voiceWidth * 0.80);
        radius += gaussian(t, 0.82, 0.030) * (5 + voiceAt(waveform, 0.82) * voiceWidth * 0.55);
        radius += Math.pow(Math.max(0, Math.sin(t * Math.PI * 12)), 22) * ringStrength * (0.25 + voice * 0.65);
        radius -= gaussian(t, 0.31, 0.035) * 4.8;
        radius -= gaussian(t, 0.54, 0.035) * 4.4;
        radius -= gaussian(t, 0.74, 0.032) * 3.6;

        if (t > 0.93) radius *= Math.max(0.22, (1 - t) / 0.07);
        if (t < 0.08) radius *= Math.sin((t / 0.08) * Math.PI * 0.5);
        radius += gaussian(t, 0.055, 0.018) * 4.8;
        radius += gaussian(t, 0.015, 0.012) * 1.8;

        points.push(new THREE.Vector2(Math.max(0.9, radius), y));
      }

      points.unshift(new THREE.Vector2(0.01, -height / 2));
      points.push(new THREE.Vector2(0.01, height / 2));
      const geometry = new THREE.LatheGeometry(points, 180);
      geometry.computeVertexNormals();
      return new THREE.Mesh(geometry, material);
    }

    function addVerticalTopLoop(group, height, material) {
      // The top loop has fixed dimensions. Changing pendant body height only moves it up/down to stay connected.
      const connector = new THREE.Mesh(new THREE.CylinderGeometry(2.8, 3.4, 12, 64), material);
      connector.position.y = height / 2 + 5.5;
      group.add(connector);

      const loop = new THREE.Mesh(new THREE.TorusGeometry(8, 1.8, 28, 120), material);
      loop.position.y = height / 2 + 18;
      group.add(loop);

      const bead = new THREE.Mesh(new THREE.SphereGeometry(3.4, 48, 24), material);
      bead.position.y = height / 2 + 10.5;
      group.add(bead);
    }

    function extractAmplitudeEnvelope(buffer, sampleCount) {
      const channel = buffer.getChannelData(0);
      const blockSize = Math.max(1, Math.floor(channel.length / sampleCount));
      const samples = [];
      for (let i = 0; i < sampleCount; i++) {
        let sum = 0;
        const start = i * blockSize;
        for (let j = 0; j < blockSize; j++) {
          const value = channel[start + j] || 0;
          sum += value * value;
        }
        samples.push(Math.sqrt(sum / blockSize));
      }
      const max = Math.max(...samples) || 1;
      return samples.map(v => v / max);
    }

    function extractSignedWaveform(buffer, sampleCount) {
      const channel = buffer.getChannelData(0);
      const blockSize = Math.max(1, Math.floor(channel.length / sampleCount));
      const samples = [];
      for (let i = 0; i < sampleCount; i++) {
        const start = i * blockSize;
        let peak = 0;
        for (let j = 0; j < blockSize; j++) {
          const value = channel[start + j] || 0;
          if (Math.abs(value) > Math.abs(peak)) peak = value;
        }
        samples.push(peak);
      }
      const max = Math.max(...samples.map(v => Math.abs(v))) || 1;
      return samples.map(v => v / max);
    }

    function enhanceVoiceShape(values) {
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      return values.map(v => Math.pow((v - min) / range, 0.72));
    }

    function voiceAt(waveform, t) {
      return waveform[Math.min(waveform.length - 1, Math.max(0, Math.floor(t * (waveform.length - 1))))];
    }

    function smoothArray(values, passes) {
      let result = values.slice();
      for (let p = 0; p < passes; p++) {
        result = result.map((v, i) => ((result[i - 1] ?? v) + v + (result[i + 1] ?? v)) / 3);
      }
      return result;
    }

    function gaussian(x, center, width) {
      return Math.exp(-Math.pow(x - center, 2) / (2 * width * width));
    }

    function setStraightSideView(object) {
      const box = new THREE.Box3().setFromObject(object);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const largest = Math.max(size.x, size.y, size.z);
      controls.target.copy(center);
      camera.position.set(center.x, center.y, center.z + largest * 2.25);
      camera.up.set(0, 1, 0);
      camera.lookAt(center);
      camera.updateProjectionMatrix();
    }
  </script>
</body>
</html>
