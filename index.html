<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Souvenir Studio</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    :root{--yellow:#f7d000;--panel:rgba(255,255,255,.9);--text:#343a40;--muted:#6b7076;--blue:#0071e3;--shadow:0 24px 70px rgba(0,0,0,.14);--radius:28px}
    *{box-sizing:border-box} body{margin:0;height:100vh;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;background:var(--yellow);color:var(--text)}
    .app{height:100vh;padding:22px;display:grid;grid-template-columns:390px 1fr;gap:22px}.panel,.stage{border-radius:var(--radius);background:var(--panel);box-shadow:var(--shadow);overflow:hidden}.panel{padding:26px;overflow-y:auto;background:linear-gradient(180deg,rgba(255,255,255,.94),rgba(255,250,225,.9))}.stage{position:relative;background:#f1f1f3}h1{font-size:30px;letter-spacing:-.04em;margin:22px 0 24px}.menu{display:grid;gap:8px;padding:6px;border-radius:18px;background:rgba(255,255,255,.55);border:1px solid rgba(0,0,0,.06)}.menu-item{height:44px;border:0;border-radius:13px;background:transparent;text-align:left;padding:0 14px;font-weight:750;color:var(--muted);cursor:pointer}.menu-item.active{background:#fff;color:var(--text);box-shadow:0 8px 22px rgba(0,0,0,.08)}
    .button{width:100%;height:50px;border:0;border-radius:12px;margin:7px 0;color:#fff;font-weight:750;font-size:16px;background:linear-gradient(180deg,#28282b,#111);cursor:pointer;box-shadow:inset 0 1px rgba(255,255,255,.12),0 8px 22px rgba(0,0,0,.13)}.button:disabled{opacity:.35;cursor:not-allowed}.button.primary{background:linear-gradient(180deg,#0077ed,#0063c8)}.button.subtle{background:linear-gradient(180deg,#a2a2a8,#85858c)}.button.recording{background:linear-gradient(180deg,#ff453a,#d70015)}.dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:#ff3b30;margin-right:8px}.timer{text-align:center;font-size:34px;font-weight:800;margin:22px 0 12px;font-variant-numeric:tabular-nums}
    .wave-card{position:relative;border-radius:18px;background:#fff;overflow:hidden;border:1px solid rgba(0,0,0,.07);margin-bottom:12px}#waveform{display:block;width:100%;height:108px;cursor:crosshair}.crop-overlay{pointer-events:none;position:absolute;inset:0}.crop-region{position:absolute;top:0;bottom:0;background:rgba(0,113,227,.13);border-left:2px solid var(--blue);border-right:2px solid var(--blue);border-radius:8px}.playhead{position:absolute;top:0;bottom:0;width:2px;background:#222;display:none}.crop-times{display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums}.time-pill{background:rgba(255,255,255,.72);border:1px solid rgba(0,0,0,.06);border-radius:999px;padding:8px;text-align:center}.playback-label{display:flex;justify-content:space-between;margin:14px 0 6px;font-size:13px;font-weight:700;color:var(--muted)}input[type=range]{width:100%;accent-color:#343a40}.selection-tools{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0}.small-button{height:38px;border-radius:999px;border:1px solid rgba(0,0,0,.08);background:#fff;font-weight:750;color:var(--text);cursor:pointer}.control{margin:20px 0}.control label{display:flex;justify-content:space-between;margin-bottom:8px;font-size:15px;font-weight:800}.control span{font-size:12px;color:var(--muted)}.colour-control label{display:block}.colour-control label span{display:none}.colour-options{display:flex;gap:13px;margin-top:12px}.colour-swatch{width:20px;height:20px;border-radius:50%;border:1px solid rgba(0,0,0,.14);background:var(--swatch);cursor:pointer;box-shadow:inset 0 1px 1px rgba(255,255,255,.6),0 1px 3px rgba(0,0,0,.18)}.colour-swatch.active{box-shadow:0 0 0 2px #fff,0 0 0 4px rgba(0,0,0,.32)}.hint{font-size:14px;line-height:1.45;color:var(--muted);margin-top:22px}.stage-badge{position:absolute;left:26px;top:24px;z-index:2;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.8);font-weight:750;font-size:13px;color:var(--muted);border:1px solid rgba(0,0,0,.06)}#viewer{width:100%;height:100%;display:block;cursor:grab}.loading{position:absolute;inset:0;display:none;place-items:center;background:rgba(245,245,247,.45);backdrop-filter:blur(8px);font-weight:800}
    @media(max-width:900px){body{overflow:auto}.app{height:auto;grid-template-columns:1fr}.stage{height:62vh;min-height:460px}}
  </style>
</head>
<body>
<main class="app">
  <aside class="panel">
    <nav class="menu"><button id="pendantModeBtn" class="menu-item active">Create pendant</button><button id="vaseModeBtn" class="menu-item">Create vase</button></nav>
    <h1 id="modeTitle">Create Pendant</h1>
    <button id="startBtn" class="button"><span class="dot"></span>Start Recording</button><button id="stopBtn" class="button subtle" disabled>Stop Recording</button><button id="playBtn" class="button" disabled>Play Recording</button>
    <div class="timer" id="timer">00:00</div>
    <div class="wave-card"><canvas id="waveform"></canvas><div class="crop-overlay"><div id="cropRegion" class="crop-region"></div><div id="playhead" class="playhead"></div></div></div>
    <div class="crop-times"><div class="time-pill">Start: <span id="cropStart">0.00s</span></div><div class="time-pill">End: <span id="cropEnd">0.00s</span></div></div>
    <div class="playback-label"><span>Playback</span><span id="playbackTime">0.00s / 0.00s</span></div><input id="playbackBar" type="range" min="0" max="0" step="0.01" value="0" disabled />
    <div class="selection-tools"><button id="selectAllBtn" class="small-button" disabled>Select All</button><button id="centerViewBtn" class="small-button">Side View</button></div>
    <button id="orientationBtn" class="button">Orientation: Vertical</button><button id="generateBtn" class="button primary" disabled>Generate 3D Pendant</button><button id="downloadBtn" class="button" disabled>Download STL</button><button id="resetBtn" class="button subtle">Reset</button>
    <div class="control"><label>Object height <span id="heightValue">70 mm body</span></label><input id="heightSlider" type="range" min="45" max="110" value="70"></div>
    <div class="control"><label>Maximum width <span id="widthValue">32 mm</span></label><input id="widthSlider" type="range" min="18" max="52" value="32"></div>
    <div class="control"><label>Voice detail <span id="detailValue">64 rings</span></label><input id="detailSlider" type="range" min="24" max="128" value="64"></div>
    <div class="control"><label>Disc thickness <span id="discValue">1.0 mm</span></label><input id="discSlider" type="range" min="0.5" max="3" step="0.1" value="1"></div>
    <div class="control" id="thicknessControl" style="display:none"><label>Wall thickness <span id="thicknessValue">0.2 cm</span></label><input id="thicknessSlider" type="range" min="1.2" max="6" step="0.1" value="2.4"></div>
    <div class="control colour-control"><label>Color <span id="colourValue">Black</span></label><div class="colour-options"><button class="colour-swatch active" data-colour="black" style="--swatch:#2c2c2e"></button><button class="colour-swatch" data-colour="silver" style="--swatch:#cfd6da"></button><button class="colour-swatch" data-colour="gold" style="--swatch:#e7c25a"></button><button class="colour-swatch" data-colour="rose" style="--swatch:#d89a8c"></button></div></div>
    <p class="hint" id="modeHint">Record your voice, crop the waveform, then generate a connected necklace-style pendant.</p>
  </aside>
  <section class="stage"><div class="stage-badge" id="stageBadge">Drag to rotate 360° • Pendant</div><canvas id="viewer"></canvas><div class="loading" id="loading">Generating…</div></section>
</main>
<script>
const $=id=>document.getElementById(id);
const state={mode:'pendant',orientation:'vertical',colour:'black',mesh:null,stlText:'',audio:new Audio(),audioChunks:[],audioBlob:null,audioBuffer:null,audioUrl:null,duration:0,cropStart:0,cropEnd:0,isRecording:false,mediaRecorder:null,stream:null,analyser:null,audioContext:null,sourceNode:null,liveData:[],waveformData:[],isDraggingCrop:false,dragStartRatio:0,isPointerRotating:false,lastPointerX:0,lastPointerY:0};
const ids=['pendantModeBtn','vaseModeBtn','modeTitle','modeHint','startBtn','stopBtn','playBtn','generateBtn','orientationBtn','downloadBtn','resetBtn','timer','waveform','cropRegion','playhead','cropStart','cropEnd','playbackBar','playbackTime','selectAllBtn','centerViewBtn','heightSlider','widthSlider','detailSlider','discSlider','thicknessControl','thicknessSlider','heightValue','widthValue','detailValue','discValue','thicknessValue','colourValue','loading','stageBadge'];
ids.forEach(id=>window[id]=$(id));
const colourSwatches=document.querySelectorAll('.colour-swatch');
const waveCtx=waveform.getContext('2d');
function fmt(sec){return !Number.isFinite(sec)?'0.00s':sec<60?`${sec.toFixed(2)}s`:`${String(Math.floor(sec/60)).padStart(2,'0')}:${String(Math.floor(sec%60)).padStart(2,'0')}`}function timerFmt(sec){return `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(Math.floor(sec%60)).padStart(2,'0')}`}
function resizeWave(){const r=waveform.getBoundingClientRect(),d=devicePixelRatio||1;waveform.width=r.width*d;waveform.height=r.height*d;waveCtx.setTransform(d,0,0,d,0,0);drawWave()}
function roundRect(ctx,x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function drawWave(){const r=waveform.getBoundingClientRect(),w=r.width,h=r.height;waveCtx.clearRect(0,0,w,h);waveCtx.fillStyle='#fff';waveCtx.fillRect(0,0,w,h);const data=state.isRecording?state.liveData:state.waveformData,bars=Math.max(48,Math.floor(w/5)),gap=3,bw=Math.max(1,w/bars-gap),c=h/2;for(let i=0;i<bars;i++){const idx=Math.floor(i/bars*Math.max(1,data.length)),amp=data[idx]||.02,bh=Math.max(4,amp*h*.86),x=i*(bw+gap)+gap/2,y=c-bh/2,inCrop=!state.isRecording&&state.duration>0&&(i/bars)>=state.cropStart/state.duration&&(i/bars)<=state.cropEnd/state.duration;waveCtx.fillStyle=inCrop?'#0071e3':'rgba(29,29,31,.38)';roundRect(waveCtx,x,y,bw,bh,999);waveCtx.fill()}updateCropOverlay();updatePlayhead()}
function updateCropOverlay(){if(!state.duration||state.isRecording){cropRegion.style.display='none';return}cropRegion.style.display='block';cropRegion.style.left=`${state.cropStart/state.duration*100}%`;cropRegion.style.width=`${Math.max(.5,(state.cropEnd-state.cropStart)/state.duration*100)}%`;cropStart.textContent=fmt(state.cropStart);cropEnd.textContent=fmt(state.cropEnd)}
function updatePlayhead(){const cur=Number(playbackBar.value||0),max=Number(playbackBar.max||0);if(!max){playhead.style.display='none';return}playhead.style.display='block';playhead.style.left=`${cur/max*100}%`;playbackTime.textContent=`${fmt(cur)} / ${fmt(max)}`}
async function startRecording(){try{state.stream=await navigator.mediaDevices.getUserMedia({audio:true});state.audioChunks=[];state.liveData=[];state.isRecording=true;state.audioContext=new(window.AudioContext||window.webkitAudioContext)();state.analyser=state.audioContext.createAnalyser();state.analyser.fftSize=1024;state.sourceNode=state.audioContext.createMediaStreamSource(state.stream);state.sourceNode.connect(state.analyser);state.mediaRecorder=new MediaRecorder(state.stream);state.mediaRecorder.ondataavailable=e=>{if(e.data.size)state.audioChunks.push(e.data)};state.mediaRecorder.onstop=finishRecording;state.mediaRecorder.start();state.recordingStartedAt=performance.now();startBtn.disabled=true;stopBtn.disabled=false;playBtn.disabled=true;generateBtn.disabled=true;selectAllBtn.disabled=true;downloadBtn.disabled=true;startBtn.classList.add('recording');state.recordingTimer=setInterval(()=>timer.textContent=timerFmt((performance.now()-state.recordingStartedAt)/1000),120);animateLive()}catch(e){alert('Microphone permission is required.')}}
function stopRecording(){if(state.mediaRecorder&&state.mediaRecorder.state!=='inactive')state.mediaRecorder.stop();state.isRecording=false;clearInterval(state.recordingTimer);startBtn.classList.remove('recording');startBtn.disabled=false;stopBtn.disabled=true;if(state.stream)state.stream.getTracks().forEach(t=>t.stop())}
async function finishRecording(){state.audioBlob=new Blob(state.audioChunks,{type:'audio/webm'});if(state.audioUrl)URL.revokeObjectURL(state.audioUrl);state.audioUrl=URL.createObjectURL(state.audioBlob);state.audio.src=state.audioUrl;const arr=await state.audioBlob.arrayBuffer(),ctx=new(window.AudioContext||window.webkitAudioContext)();state.audioBuffer=await ctx.decodeAudioData(arr.slice(0));state.duration=state.audioBuffer.duration;state.cropStart=0;state.cropEnd=state.duration;state.waveformData=extractWaveform(state.audioBuffer,180);timer.textContent=timerFmt(state.duration);playbackBar.max=state.duration.toFixed(2);playbackBar.value=0;playbackBar.disabled=false;playBtn.disabled=false;generateBtn.disabled=false;selectAllBtn.disabled=false;drawWave();generateObject(false)}
function animateLive(){if(!state.isRecording||!state.analyser)return;const b=new Uint8Array(state.analyser.fftSize);state.analyser.getByteTimeDomainData(b);let sum=0;for(const v of b){const c=(v-128)/128;sum+=c*c}state.liveData.push(Math.min(1,Math.sqrt(sum/b.length)*5.4+.03));if(state.liveData.length>180)state.liveData.shift();drawWave();requestAnimationFrame(animateLive)}
function extractWaveform(buffer,samples){const raw=buffer.getChannelData(0),block=Math.floor(raw.length/samples)||1,data=[];for(let i=0;i<samples;i++){let sum=0,start=i*block;for(let j=0;j<block&&start+j<raw.length;j++){const v=raw[start+j];sum+=v*v}data.push(Math.min(1,Math.sqrt(sum/block)*8))}return data}
function playRecording(){if(!state.audioUrl)return;let s=Number(playbackBar.value||0);if(s>=state.duration-.05||state.audio.ended)s=0;state.audio.pause();state.audio.currentTime=s;state.audio.play();playBtn.textContent='Playing…';tickPlayback()}function tickPlayback(){if(!state.audio.paused){playbackBar.value=state.audio.currentTime.toFixed(2);updatePlayhead();requestAnimationFrame(tickPlayback)}}state.audio.onended=()=>{playBtn.textContent='Play Recording';playbackBar.value=state.duration.toFixed(2);updatePlayhead()};playbackBar.oninput=()=>{state.audio.currentTime=Number(playbackBar.value||0);updatePlayhead()};
function waveRatio(e){const r=waveform.getBoundingClientRect();return Math.min(1,Math.max(0,(e.clientX-r.left)/r.width))}function cropChanged(){drawWave();generateObject(false)}waveform.onpointerdown=e=>{if(!state.duration||state.isRecording)return;state.isDraggingCrop=true;state.dragStartRatio=waveRatio(e);waveform.setPointerCapture(e.pointerId);const t=state.dragStartRatio*state.duration;state.cropStart=t;state.cropEnd=t;cropChanged()};waveform.onpointermove=e=>{if(!state.isDraggingCrop||!state.duration)return;const c=waveRatio(e),a=Math.min(c,state.dragStartRatio)*state.duration,b=Math.max(c,state.dragStartRatio)*state.duration;state.cropStart=a;state.cropEnd=Math.max(a+.1,b);cropChanged()};waveform.onpointerup=()=>{state.isDraggingCrop=false;if(state.cropEnd-state.cropStart<.1)state.cropEnd=Math.min(state.duration,state.cropStart+.5);cropChanged()};selectAllBtn.onclick=()=>{state.cropStart=0;state.cropEnd=state.duration;cropChanged()};
startBtn.onclick=startRecording;stopBtn.onclick=stopRecording;playBtn.onclick=playRecording;
const scene=new THREE.Scene();scene.background=new THREE.Color(0xf1f1f3);const camera=new THREE.PerspectiveCamera(35,1,.1,1000),renderer=new THREE.WebGLRenderer({canvas:viewer,antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.outputEncoding=THREE.sRGBEncoding;scene.add(new THREE.HemisphereLight(0xffffff,0x1f1f22,.95));let l=new THREE.DirectionalLight(0xffffff,4.8);l.position.set(3.5,5.5,5);scene.add(l);l=new THREE.DirectionalLight(0xffffff,.55);l.position.set(-5,1.5,3);scene.add(l);l=new THREE.DirectionalLight(0xffffff,5.2);l.position.set(-3,4,-5);scene.add(l);l=new THREE.DirectionalLight(0xffffff,3.8);l.position.set(6,0,2);scene.add(l);camera.position.set(0,0,185);camera.lookAt(0,0,0);
function resizeRenderer(){const p=viewer.parentElement,w=p.clientWidth,h=p.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();resizeWave()}window.onresize=resizeRenderer;
function updateLabels(){heightValue.textContent=state.mode==='vase'?`${(heightSlider.value/10).toFixed(1)} cm`:`${heightSlider.value} mm body`;widthValue.textContent=state.mode==='vase'?`${(widthSlider.value/10).toFixed(1)} cm`:`${widthSlider.value} mm`;detailValue.textContent=`${detailSlider.value} rings`;discValue.textContent=state.mode==='vase'?`${(discSlider.value/10).toFixed(2)} cm`:`${Number(discSlider.value).toFixed(1)} mm`;thicknessValue.textContent=`${(thicknessSlider.value/10).toFixed(1)} cm`}function updateLabelsAndPreview(){updateLabels();generateObject(false)}heightSlider.oninput=widthSlider.oninput=detailSlider.oninput=discSlider.oninput=thicknessSlider.oninput=updateLabelsAndPreview;
function getAmps(){const detail=Number(detailSlider.value);if(!state.audioBuffer||!state.duration)return Array.from({length:detail},(_,i)=>.35+.25*Math.sin(i*.6));const ch=state.audioBuffer.getChannelData(0),sr=state.audioBuffer.sampleRate,ss=Math.floor(state.cropStart*sr),es=Math.floor(state.cropEnd*sr),len=Math.max(1,es-ss),block=Math.max(1,Math.floor(len/detail)),amps=[];for(let i=0;i<detail;i++){let sum=0,start=ss+i*block;for(let j=0;j<block&&start+j<ch.length;j++){const v=Math.abs(ch[start+j]);sum+=v*v}amps.push(Math.min(1,Math.sqrt(sum/block)*12))}return amps}function resample(src,count){const out=[];for(let i=0;i<count;i++)out.push(src[Math.min(src.length-1,Math.floor(i/count*src.length))]||.35);return out}
function material(){const p={black:{color:0xd6dde2,metalness:.98,roughness:.14,clearcoat:1},silver:{color:0x2c2c2e,metalness:.55,roughness:.32,clearcoat:.9},gold:{color:0xf2c94c,metalness:.98,roughness:.18,clearcoat:1},rose:{color:0xe6a193,metalness:.96,roughness:.2,clearcoat:1}}[state.colour];return new THREE.MeshPhysicalMaterial({...p,clearcoatRoughness:.04,reflectivity:1})}
function merge(geos){const verts=[],idx=[];for(const g of geos){const base=verts.length/3,pos=g.getAttribute('position').array,ind=g.index.array;for(let i=0;i<pos.length;i++)verts.push(pos[i]);for(let i=0;i<ind.length;i++)idx.push(ind[i]+base)}const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));g.setIndex(idx);g.computeVertexNormals();return g}
function pendantGeometry(){const h=Number(heightSlider.value),max=Number(widthSlider.value)/2,count=Math.max(8,Math.min(Number(detailSlider.value),Math.round(h/Number(discSlider.value)))),lh=h/count,amps=resample(getAmps(),count),geos=[];for(let i=0;i<count;i++){const r=Math.max(max*.18,Math.min(max*1.35,max*(.32+amps[i]*1.35))),g=new THREE.CylinderGeometry(r,r,lh*.92,96,1,false);g.translate(0,-h/2+lh/2+i*lh,0);geos.push(g)}return merge(geos)}
function vaseGeometry(){
  // Vase = same voice-driven outer profile as pendant, but scaled as a continuous vessel:
  // solid-looking walls, sealed bottom, and one open hole at the top.
  const h = Number(heightSlider.value);
  const max = Number(widthSlider.value) / 2;
  const wall = Number(thicknessSlider.value);
  const count = Math.max(32, Number(detailSlider.value));
  const amps = resample(getAmps(), count + 1);
  const rad = 128;
  const verts = [];
  const idx = [];

  for (let i = 0; i <= count; i++) {
    const t = i / count;
    const y = -h / 2 + t * h;
    const amp = amps[i] || .35;

    // Same waveform logic as pendant, but continuous so it reads as a vase, not floating rings.
    let rOut = Math.max(max * .22, Math.min(max * 1.35, max * (.34 + amp * 1.34)));

    // Keep a usable top opening and a stable base.
    if (i === 0) rOut = Math.max(rOut, max * .45);
    if (i === count) rOut = Math.max(rOut, max * .48);

    const rIn = Math.max(2, rOut - wall);

    // outer ring
    for (let j = 0; j < rad; j++) {
      const a = j / rad * Math.PI * 2;
      verts.push(Math.cos(a) * rOut, y, Math.sin(a) * rOut);
    }

    // inner ring
    for (let j = 0; j < rad; j++) {
      const a = j / rad * Math.PI * 2;
      verts.push(Math.cos(a) * rIn, y, Math.sin(a) * rIn);
    }
  }

  for (let i = 0; i < count; i++) {
    const row = i * rad * 2;
    const next = (i + 1) * rad * 2;

    for (let j = 0; j < rad; j++) {
      const j2 = (j + 1) % rad;

      const o1 = row + j;
      const o2 = row + j2;
      const o3 = next + j;
      const o4 = next + j2;

      const in1 = row + rad + j;
      const in2 = row + rad + j2;
      const in3 = next + rad + j;
      const in4 = next + rad + j2;

      // continuous outer surface
      idx.push(o1, o3, o2, o2, o3, o4);

      // continuous inner surface, flipped normals
      idx.push(in2, in3, in1, in2, in4, in3);
    }
  }

  // Open top: rim only, no cap across the opening.
  const top = count * rad * 2;
  for (let j = 0; j < rad; j++) {
    const j2 = (j + 1) % rad;
    idx.push(top + j, top + j2, top + rad + j);
    idx.push(top + j2, top + rad + j2, top + rad + j);
  }

  // Sealed bottom: close from outer edge to inner edge, then fill the inner hole.
  for (let j = 0; j < rad; j++) {
    const j2 = (j + 1) % rad;
    idx.push(j2, j, rad + j);
    idx.push(j2, rad + j, rad + j2);
  }

  const bottomCenter = verts.length / 3;
  verts.push(0, -h / 2, 0);
  for (let j = 0; j < rad; j++) {
    const j2 = (j + 1) % rad;
    idx.push(bottomCenter, rad + j2, rad + j);
  }

  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  g.setIndex(idx);
  g.computeVertexNormals();
  return g;
}
function loopGroup(h){const group=new THREE.Group(),m=material(),y=h/2,bail=new THREE.Mesh(new THREE.TorusGeometry(7.2,1.55,28,120),m);bail.scale.set(.68,1.42,1);bail.position.y=y+22.5;group.add(bail);const ring=new THREE.Mesh(new THREE.TorusGeometry(4.8,1.15,24,96),m);ring.position.y=y+10.8;group.add(ring);const neck=new THREE.Mesh(new THREE.CylinderGeometry(2.5,4.8,7.2,64),m);neck.position.y=y+3.4;group.add(neck);return group}
function applyOrientation(){if(!state.mesh)return;state.mesh.rotation.z=state.mode==='pendant'&&state.orientation==='horizontal'?Math.PI/2:0}
function generateObject(show=true,preserve=true){let prev=state.mesh&&preserve?{x:state.mesh.rotation.x,y:state.mesh.rotation.y,z:state.mesh.rotation.z}:null;if(show)loading.style.display='grid';requestAnimationFrame(()=>{if(state.mesh)scene.remove(state.mesh);const h=Number(heightSlider.value),max=Number(widthSlider.value)/2,group=new THREE.Group(),geo=state.mode==='vase'?vaseGeometry():(state.audioBuffer?pendantGeometry():new THREE.CylinderGeometry(max*.72,max*.72,h,96));group.add(new THREE.Mesh(geo,material()));if(state.mode==='pendant'&&state.audioBuffer&&state.orientation==='vertical')group.add(loopGroup(h));scene.add(group);state.mesh=group;applyOrientation();if(prev){state.mesh.rotation.x=prev.x;state.mesh.rotation.y=prev.y;if(preserve)state.mesh.rotation.z=prev.z}state.stlText=toSTL(group,state.mode==='pendant'?'voice_pendant':'voice_vase');downloadBtn.disabled=false;if(show)setTimeout(()=>loading.style.display='none',250)})}
function switchMode(mode){state.mode=mode;pendantModeBtn.classList.toggle('active',mode==='pendant');vaseModeBtn.classList.toggle('active',mode==='vase');modeTitle.textContent=mode==='pendant'?'Create Pendant':'Create Vase';generateBtn.textContent=mode==='pendant'?'Generate 3D Pendant':'Generate 3D Vase';orientationBtn.style.display=mode==='pendant'?'block':'none';thicknessControl.style.display=mode==='vase'?'block':'none';modeHint.textContent=mode==='pendant'?'Record your voice, crop the waveform, then generate a connected necklace-style pendant.':'Record your voice, crop the waveform, then generate a hollow vase with a sealed bottom.';updateLabels();generateObject(false,false)}pendantModeBtn.onclick=()=>switchMode('pendant');vaseModeBtn.onclick=()=>switchMode('vase');orientationBtn.onclick=()=>{state.orientation=state.orientation==='vertical'?'horizontal':'vertical';orientationBtn.textContent=`Orientation: ${state.orientation[0].toUpperCase()+state.orientation.slice(1)}`;generateObject(false,false)};centerViewBtn.onclick=()=>{if(state.mesh){state.mesh.rotation.set(0,0,0);applyOrientation()}camera.position.set(0,0,185);camera.lookAt(0,0,0)};
colourSwatches.forEach(btn=>btn.onclick=()=>{state.colour=btn.dataset.colour;colourSwatches.forEach(s=>s.classList.toggle('active',s===btn));colourValue.textContent={black:'Black',silver:'Starry silver',gold:'Bright gold',rose:'Rose gold'}[state.colour];generateObject(false)});resetBtn.onclick=()=>{state.audio.pause();state.audioBuffer=null;state.duration=0;state.cropStart=0;state.cropEnd=0;state.waveformData=[];timer.textContent='00:00';playbackBar.value=0;playbackBar.max=0;playbackBar.disabled=true;playbackTime.textContent='0.00s / 0.00s';playBtn.disabled=true;generateBtn.disabled=true;selectAllBtn.disabled=true;heightSlider.value=70;widthSlider.value=32;detailSlider.value=64;discSlider.value=1;thicknessSlider.value=2.4;updateLabels();drawWave();generateObject(false)};
viewer.onpointerdown=e=>{state.isPointerRotating=true;state.lastPointerX=e.clientX;state.lastPointerY=e.clientY;viewer.setPointerCapture(e.pointerId)};viewer.onpointermove=e=>{if(!state.isPointerRotating||!state.mesh)return;state.mesh.rotation.y+=(e.clientX-state.lastPointerX)*.01;state.mesh.rotation.x+=(e.clientY-state.lastPointerY)*.01;state.lastPointerX=e.clientX;state.lastPointerY=e.clientY};viewer.onpointerup=()=>state.isPointerRotating=false;
function toSTL(group,name){group.updateMatrixWorld(true);let stl=`solid ${name}\n`;group.traverse(o=>{if(!o.isMesh)return;const g=o.geometry.clone();g.applyMatrix4(o.matrixWorld);const pos=g.getAttribute('position'),ind=g.index,n=new THREE.Vector3(),a=new THREE.Vector3(),b=new THREE.Vector3(),c=new THREE.Vector3(),faces=ind?ind.count/3:pos.count/3;for(let i=0;i<faces;i++){const ia=ind?ind.getX(i*3):i*3,ib=ind?ind.getX(i*3+1):i*3+1,ic=ind?ind.getX(i*3+2):i*3+2;a.fromBufferAttribute(pos,ia);b.fromBufferAttribute(pos,ib);c.fromBufferAttribute(pos,ic);n.crossVectors(new THREE.Vector3().subVectors(b,a),new THREE.Vector3().subVectors(c,a)).normalize();stl+=` facet normal ${n.x} ${n.y} ${n.z}\n  outer loop\n   vertex ${a.x} ${a.y} ${a.z}\n   vertex ${b.x} ${b.y} ${b.z}\n   vertex ${c.x} ${c.y} ${c.z}\n  endloop\n endfacet\n`}});return stl+`endsolid ${name}`}downloadBtn.onclick=()=>{const blob=new Blob([state.stlText],{type:'model/stl'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=state.mode==='pendant'?'voice-pendant.stl':'voice-vase.stl';a.click();URL.revokeObjectURL(a.href)};generateBtn.onclick=()=>generateObject(true);
function animate(){requestAnimationFrame(animate);if(state.mesh&&!state.isPointerRotating&&!(state.mode==='pendant'&&state.orientation==='horizontal'))state.mesh.rotation.y+=.0018;renderer.render(scene,camera)}
updateLabels();resizeRenderer();generateObject(false);animate();
