<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Ornament 3D Generator</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f1ec;
      color: #222;
    }

    header {
      padding: 28px;
      text-align: center;
      background: #1f1f1f;
      color: white;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
    }

    .panel {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    button {
      width: 100%;
      padding: 14px 16px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      background: #222;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    #viewer {
      height: 680px;
      border-radius: 16px;
      overflow: hidden;
      background: #ddd;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      color: #555;
      line-height: 1.5;
    }

    @media (max-width: 850px) {
      main {
        grid-template-columns: 1fr;
      }
      #viewer {
        height: 480px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Voice Ornament 3D Generator</h1>
    <p>Record a voice and transform it into a vertical printable ornament.</p>
  </header>

  <main>
    <section class="panel">
      <h2>Create Ornament</h2>

      <button id="startBtn">Start Recording</button>
      <button id="stopBtn" disabled>Stop Recording</button>
      <button id="generateBtn" disabled>Generate 3D Ornament</button>
      <button id="downloadBtn" disabled>Download STL</button>

      <label for="heightInput">Object height</label>
      <input id="heightInput" type="range" min="90" max="180" value="140" />

      <label for="radiusInput">Maximum width</label>
      <input id="radiusInput" type="range" min="10" max="34" value="24" />

      <label for="detailInput">Voice detail</label>
      <input id="detailInput" type="range" min="40" max="140" value="90" />

      <label for="ringInput">Ring strength</label>
      <input id="ringInput" type="range" min="0" max="20" value="12" />

      <div class="status" id="status">
        Ready. Record 3 to 8 seconds of voice. The audio will generate a sculptural vertical form.
      </div>
    </section>

    <section class="panel">
      <div id="viewer"></div>
    </section>
  </main>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { STLExporter } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/exporters/STLExporter.js';

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const generateBtn = document.getElementById('generateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusEl = document.getElementById('status');
    const heightInput = document.getElementById('heightInput');
    const radiusInput = document.getElementById('radiusInput');
    const detailInput = document.getElementById('detailInput');
    const ringInput = document.getElementById('ringInput');
    const viewer = document.getElementById('viewer');

    let mediaRecorder;
    let audioChunks = [];
    let audioBuffer = null;
    let currentObject = null;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf4f1ec);

    const camera = new THREE.PerspectiveCamera(45, viewer.clientWidth / viewer.clientHeight, 0.1, 3000);
    camera.position.set(110, -180, 120);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    viewer.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 65);

    scene.add(new THREE.AmbientLight(0xffffff, 0.55));

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(100, -120, 220);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.45);
    fillLight.position.set(-120, 100, 120);
    scene.add(fillLight);

    const grid = new THREE.GridHelper(160, 16);
    scene.add(grid);

    animate();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = viewer.clientWidth / viewer.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    });

    startBtn.onclick = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];
        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.ondataavailable = event => audioChunks.push(event.data);

        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const arrayBuffer = await audioBlob.arrayBuffer();
          const audioContext = new AudioContext();
          audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
          stream.getTracks().forEach(track => track.stop());
          generateBtn.disabled = false;
          statusEl.textContent = 'Recording complete. Click Generate 3D Ornament.';
        };

        mediaRecorder.start();
        startBtn.disabled = true;
        stopBtn.disabled = false;
        generateBtn.disabled = true;
        downloadBtn.disabled = true;
        statusEl.textContent = 'Recording... speak clearly.';
      } catch (error) {
        console.error(error);
        statusEl.textContent = 'Microphone failed. Use Chrome/Edge and open this through GitHub Pages, Netlify, or Live Server.';
      }
    };

    stopBtn.onclick = () => {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }
    };

    generateBtn.onclick = () => {
      if (!audioBuffer) return;
      buildVoiceOrnament(audioBuffer);
      downloadBtn.disabled = false;
      statusEl.textContent = 'Ornament generated. Drag to rotate. Download STL when ready.';
    };

    downloadBtn.onclick = () => {
      if (!currentObject) return;
      const exporter = new STLExporter();
      const stlString = exporter.parse(currentObject, { binary: false });
      const blob = new Blob([stlString], { type: 'text/plain' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'voice-ornament.stl';
      link.click();
    };

    function buildVoiceOrnament(buffer) {
      if (currentObject) scene.remove(currentObject);

      currentObject = new THREE.Group();

      const height = Number(heightInput.value);
      const maxRadius = Number(radiusInput.value);
      const detail = Number(detailInput.value);
      const ringStrength = Number(ringInput.value);

      const waveform = smoothArray(extractWaveform(buffer, detail), 4);

      const silver = new THREE.MeshStandardMaterial({
        color: 0xd8d8d8,
        metalness: 0.75,
        roughness: 0.23
      });

      const darkSilver = new THREE.MeshStandardMaterial({
        color: 0x9c9c9c,
        metalness: 0.8,
        roughness: 0.28
      });

      const mainMesh = createLatheVoiceBody(waveform, height, maxRadius, ringStrength, silver);
      currentObject.add(mainMesh);

      addOrnamentalDiscs(currentObject, waveform, height, maxRadius, ringStrength, darkSilver);
      addTopLoop(currentObject, height, silver);
      addBottomFinial(currentObject, silver);

      currentObject.rotation.x = -Math.PI / 2;
      scene.add(currentObject);
      frameObject(currentObject);
    }

    function createLatheVoiceBody(waveform, height, maxRadius, ringStrength, material) {
      const points = [];
      const count = waveform.length;

      for (let i = 0; i < count; i++) {
        const t = i / (count - 1);
        const z = t * height;

        const baseProfile = 4.5 + Math.sin(t * Math.PI) * 4;
        const voiceBulge = waveform[i] * maxRadius * 0.55;

        const ringPulse = Math.pow(Math.max(0, Math.sin(t * Math.PI * 9)), 18) * ringStrength;
        const necking = Math.pow(Math.abs(Math.sin(t * Math.PI * 4)), 1.5) * 2.2;

        let radius = baseProfile + voiceBulge + ringPulse - necking;

        // Narrow top and bottom so it feels like a hanging ornament.
        if (t < 0.08) radius *= t / 0.08;
        if (t > 0.94) radius *= (1 - t) / 0.06;

        radius = Math.max(1.5, radius);
        points.push(new THREE.Vector2(radius, z));
      }

      const geometry = new THREE.LatheGeometry(points, 128);
      geometry.computeVertexNormals();
      return new THREE.Mesh(geometry, material);
    }

    function addOrnamentalDiscs(group, waveform, height, maxRadius, ringStrength, material) {
      const discPositions = [0.22, 0.43, 0.66, 0.82];

      discPositions.forEach((t, index) => {
        const z = t * height;
        const amp = waveform[Math.floor(t * (waveform.length - 1))] || 0.5;
        const radius = maxRadius * (0.45 + amp * 0.8) + ringStrength * 0.7;
        const thickness = index === 1 || index === 2 ? 3.2 : 2.2;

        const disc = new THREE.Mesh(
          new THREE.CylinderGeometry(radius, radius * 0.72, thickness, 128),
          material
        );
        disc.rotation.x = Math.PI / 2;
        disc.position.z = z;
        group.add(disc);

        const lipTop = new THREE.Mesh(
          new THREE.TorusGeometry(radius * 0.98, 0.9, 12, 128),
          material
        );
        lipTop.position.z = z + thickness / 2;
        group.add(lipTop);

        const lipBottom = new THREE.Mesh(
          new THREE.TorusGeometry(radius * 0.78, 0.65, 12, 128),
          material
        );
        lipBottom.position.z = z - thickness / 2;
        group.add(lipBottom);
      });
    }

    function addTopLoop(group, height, material) {
      const loop = new THREE.Mesh(
        new THREE.TorusGeometry(7, 1.4, 18, 80),
        material
      );
      loop.rotation.x = Math.PI / 2;
      loop.position.z = height + 10;
      group.add(loop);

      const connector = new THREE.Mesh(
        new THREE.CylinderGeometry(2.1, 2.1, 16, 48),
        material
      );
      connector.rotation.x = Math.PI / 2;
      connector.position.z = height + 2;
      group.add(connector);
    }

    function addBottomFinial(group, material) {
      const drop1 = new THREE.Mesh(
        new THREE.ConeGeometry(5, 12, 64),
        material
      );
      drop1.rotation.x = Math.PI;
      drop1.position.z = -8;
      group.add(drop1);

      const bead = new THREE.Mesh(
        new THREE.SphereGeometry(4.2, 48, 24),
        material
      );
      bead.position.z = -15;
      group.add(bead);

      const tip = new THREE.Mesh(
        new THREE.ConeGeometry(3, 9, 64),
        material
      );
      tip.rotation.x = Math.PI;
      tip.position.z = -22;
      group.add(tip);
    }

    function extractWaveform(buffer, sampleCount) {
      const channel = buffer.getChannelData(0);
      const blockSize = Math.floor(channel.length / sampleCount);
      const samples = [];

      for (let i = 0; i < sampleCount; i++) {
        let sum = 0;
        const start = i * blockSize;

        for (let j = 0; j < blockSize; j++) {
          const value = channel[start + j] || 0;
          sum += value * value;
        }

        samples.push(Math.sqrt(sum / blockSize));
      }

      const max = Math.max(...samples) || 1;
      return samples.map(v => v / max);
    }

    function smoothArray(values, passes) {
      let result = values.slice();
      for (let p = 0; p < passes; p++) {
        result = result.map((v, i) => {
          const prev = result[i - 1] ?? v;
          const next = result[i + 1] ?? v;
          return (prev + v + next) / 3;
        });
      }
      return result;
    }

    function frameObject(object) {
      const box = new THREE.Box3().setFromObject(object);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const largest = Math.max(size.x, size.y, size.z);

      controls.target.copy(center);
      camera.position.set(center.x + largest * 0.8, center.y - largest * 1.25, center.z + largest * 0.85);
      camera.lookAt(center);
    }
  </script>
</body>
</html>
